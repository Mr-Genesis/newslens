# Render Blueprint — deploy with "New > Blueprint" at https://dashboard.render.com
# Docs: https://docs.render.com/infrastructure-as-code

databases:
  - name: newslens-db
    plan: free
    databaseName: newslens
    user: newslens
    postgresMajorVersion: "16"
    ipAllowList: []  # only internal access

services:
  - type: web
    name: newslens-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newslens-db
          property: connectionString
        # Render provides postgresql:// — we need postgresql+asyncpg://
        # Override manually after first deploy (see DEPLOY.md)
      - key: OPENAI_API_KEY
        sync: false  # set manually in dashboard
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: RSS_FETCH_INTERVAL_MINUTES
        value: "10"
      - key: GDELT_FETCH_INTERVAL_MINUTES
        value: "15"
      - key: EMBEDDING_BACKFILL_INTERVAL_MINUTES
        value: "5"
